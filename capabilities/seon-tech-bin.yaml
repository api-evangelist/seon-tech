naftiko: 1.0.0-alpha2
info:
  label: SEON API — BIN
  description: 'SEON API — BIN. 1 operations. Lead operation: Lookup BIN (card) information. Self-contained Naftiko capability
    covering one SEON business surface.'
  tags:
  - SEON
  - BIN
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SEON_TECH_API_KEY: SEON_TECH_API_KEY
capability:
  consumes:
  - type: http
    namespace: seon-tech-bin
    baseUri: https://api.seon.io
    description: SEON API — BIN business capability. Self-contained, no shared references.
    resources:
    - name: SeonRestService-bin-api-v1-bin
      path: /SeonRestService/bin-api/v1/{bin}
      operations:
      - name: lookupbin
        method: GET
        description: Lookup BIN (card) information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: bin
          in: path
          type: string
          description: Bank Identification Number to evaluate.
          required: true
        - name: include
          in: query
          type: string
          description: Optional include directives (e.g. id).
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.SEON_TECH_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: seon-tech-bin-rest
    port: 8080
    description: REST adapter for SEON API — BIN. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/seonrestservice/bin-api/v1/{bin}
      name: seonrestservice-bin-api-v1-bin
      description: REST surface for SeonRestService-bin-api-v1-bin.
      operations:
      - method: GET
        name: lookupbin
        description: Lookup BIN (card) information
        call: seon-tech-bin.lookupbin
        with:
          bin: rest.bin
          include: rest.include
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: seon-tech-bin-mcp
    port: 9090
    transport: http
    description: MCP adapter for SEON API — BIN. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: lookup-bin-card-information
      description: Lookup BIN (card) information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: seon-tech-bin.lookupbin
      with:
        bin: tools.bin
        include: tools.include
      outputParameters:
      - type: object
        mapping: $.
