naftiko: 1.0.0-alpha2
info:
  label: SEON API — Phone
  description: 'SEON API — Phone. 1 operations. Lead operation: Enrich a phone number. Self-contained Naftiko capability covering
    one SEON business surface.'
  tags:
  - SEON
  - Phone
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SEON_TECH_API_KEY: SEON_TECH_API_KEY
capability:
  consumes:
  - type: http
    namespace: seon-tech-phone
    baseUri: https://api.seon.io
    description: SEON API — Phone business capability. Self-contained, no shared references.
    resources:
    - name: SeonRestService-phone-api-v2
      path: /SeonRestService/phone-api/v2
      operations:
      - name: enrichphone
        method: POST
        description: Enrich a phone number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: X-API-KEY
      value: '{{env.SEON_TECH_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: seon-tech-phone-rest
    port: 8080
    description: REST adapter for SEON API — Phone. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/seonrestservice/phone-api/v2
      name: seonrestservice-phone-api-v2
      description: REST surface for SeonRestService-phone-api-v2.
      operations:
      - method: POST
        name: enrichphone
        description: Enrich a phone number
        call: seon-tech-phone.enrichphone
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: seon-tech-phone-mcp
    port: 9090
    transport: http
    description: MCP adapter for SEON API — Phone. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: enrich-phone-number
      description: Enrich a phone number
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: seon-tech-phone.enrichphone
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
